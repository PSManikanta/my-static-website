<!DOCTYPE html>
<html>
<head>
    <title>My DevOps Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: #f0f0f0;
        }
        h1 { color: #3498db; }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .green { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 CI/CD Pipeline Demo</h1>
        <p>This website was deployed automatically using AWS CodePipeline!</p>
        <hr>
        <p><strong>How it works:</strong></p>
        <p>1. I push code to GitHub<br>
        2. CodePipeline detects the change<br>
        3. Automatically deploys to S3<br>
        4. Website updates instantly</p>
        <p class="green">✅ Pipeline Status: ACTIVE</p>
    </div>
</body>
</html>
